name: Update Box Office Data

on:
  schedule:
    # IST 2PM = 08:30 UTC, 7PM = 13:30 UTC, 1AM = 19:30 UTC
    - cron: '30 8 * * *'
    - cron: '30 13 * * *'
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install aiohttp aiofiles
      - run: python fetch_boxoffice.py --rebuild-yearly
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main   # <-- FIXED: autostash local changes
          git add data/ database/ state.json
          git diff --staged --quiet || git commit -m "Automated data update $(date -I)"
          git push origin main
